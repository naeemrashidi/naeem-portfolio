<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <rect width="1000" height="600" fill="#0a0a0a"/>
  <g transform="translate(100,5)">
    <!-- Client -->
    <rect x="40" y="185" width="140" height="80" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
    <text x="110" y="231" text-anchor="middle" fill="#e5e7eb" font-size="22" font-weight="600">Client</text>

    <!-- arrow Client -> Gateway -->
    <line x1="180" y1="225" x2="248" y2="225" stroke="#3b82f6" stroke-width="3"/>
    <polygon points="248,225 236,218 236,232" fill="#3b82f6"/>
    <text x="214" y="205" text-anchor="middle" fill="#9ca3af" font-size="15">HTTP</text>

    <!-- Gateway -->
    <rect x="250" y="185" width="150" height="80" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
    <text x="325" y="222" text-anchor="middle" fill="#e5e7eb" font-size="22" font-weight="600">Gateway</text>
    <text x="325" y="247" text-anchor="middle" fill="#60a5fa" font-size="15">JWT auth</text>

    <!-- arrow Gateway -> Messaging -->
    <line x1="400" y1="225" x2="468" y2="225" stroke="#22d3ee" stroke-width="3"/>
    <polygon points="468,225 456,218 456,232" fill="#22d3ee"/>
    <text x="434" y="205" text-anchor="middle" fill="#9ca3af" font-size="15">gRPC</text>

    <!-- Messaging Service -->
    <rect x="470" y="175" width="190" height="100" rx="10" fill="#111827" stroke="#22d3ee" stroke-width="2"/>
    <text x="565" y="220" text-anchor="middle" fill="#e5e7eb" font-size="22" font-weight="600">Messaging</text>
    <text x="565" y="248" text-anchor="middle" fill="#e5e7eb" font-size="22" font-weight="600">Service</text>

    <!-- arrows to Postgres / Redis -->
    <line x1="565" y1="275" x2="565" y2="315" stroke="#a78bfa" stroke-width="3"/>
    <line x1="565" y1="315" x2="695" y2="315" stroke="#a78bfa" stroke-width="3"/>
    <line x1="565" y1="315" x2="435" y2="315" stroke="#a78bfa" stroke-width="3"/>
    <line x1="695" y1="315" x2="695" y2="343" stroke="#a78bfa" stroke-width="3"/>
    <line x1="435" y1="315" x2="435" y2="343" stroke="#a78bfa" stroke-width="3"/>
    <polygon points="695,343 688,331 702,331" fill="#a78bfa"/>
    <polygon points="435,343 428,331 442,331" fill="#a78bfa"/>

    <!-- Postgres -->
    <rect x="630" y="345" width="130" height="70" rx="10" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
    <text x="695" y="386" text-anchor="middle" fill="#e5e7eb" font-size="19" font-weight="600">PostgreSQL</text>

    <!-- Redis -->
    <rect x="370" y="345" width="130" height="70" rx="10" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
    <text x="435" y="386" text-anchor="middle" fill="#e5e7eb" font-size="19" font-weight="600">Redis</text>
  </g>
</svg>
